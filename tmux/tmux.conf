# OSC 52 clipboard passthrough — nvim yanks propagate through tmux to macOS
set -g set-clipboard on
set -g allow-passthrough on

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-features ",xterm-256color:RGB"
set -ag terminal-features ",xterm-256color:clipboard"
# Ghostty (outer terminal) — negotiate features against its real termname,
# else colour/key sequences mismatch and the TUI renders garbled.
set -ag terminal-features ",xterm-ghostty:RGB"
set -ag terminal-features ",xterm-ghostty:clipboard"

# Mouse support
set -g mouse off

# Longer scrollback
set -g history-limit 50000

# 1-based indexing
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Extended keys — pass Shift-Enter, Ctrl-; etc. through to apps (CSI u mode)
set -s extended-keys always
set -s extended-keys-format csi-u
set -as terminal-features ",xterm-256color:extkeys"
set -as terminal-features ",xterm-ghostty:extkeys"

# set vim for copy
setw -g mode-keys vi


# Splits — symmetric with nvim <leader>\/-
unbind s
unbind v
unbind '"'
unbind %
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Session picker (re-bind after unbinding old s)
bind s choose-tree -Zs -O name

# lazygit in a floating popup — opens in the pane's cwd (worktree-aware), closes on exit
bind g display-popup -E -d "#{pane_current_path}" -w 90% -h 90% "lazygit"

# Sessionize worktrees — open current repo as one session, one window per worktree.
# Pass the pane's cwd: run-shell uses the server dir, not the pane, by default.
bind-key S run-shell "~/.config-remote/tmux/tmux-worktree '#{pane_current_path}'"

# Resize — repeatable, mirrors nvim. Capitals so they don't clash with h/j/k/l nav
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# Vim-style pane navigation (mirrors Ctrl-w h/j/k/l in nvim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim-tmux-navigator: C-h/j/k/l crosses the nvim/tmux boundary transparently.
# is_vim matches the pane's running command (cleaner than grepping ps output);
# -F evaluates it as a format, where "1" = true.
is_vim="#{m:*nvim*,#{pane_current_command}}"
bind-key -n 'C-h' if-shell -F "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell -F "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell -F "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell -F "$is_vim" 'send-keys C-l' 'select-pane -R'

# Close pane (mirrors Ctrl-w c in nvim)
unbind c
bind c kill-pane

# Reduce escape delay (important for nvim)
set -sg escape-time 10

# Focus events (needed by nvim autoread)
set -g focus-events on

# Window chooser — collapsed session trees with windows visible
bind w choose-tree -sw

# Tmux Prefix key
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix


# Active pane signal — active keeps terminal bg, inactive dims, labeled bar on top
set -g window-style        'bg=colour235'
set -g window-active-style 'bg=terminal'
set -g pane-border-status top
set -g pane-border-format ' #{?pane_active,#[fg=black#,bg=colour118] ACTIVE ,#[fg=colour244#,bg=black] #P } #{pane_current_command} '
# Divider lines match the inactive bg so they blend away
set -g pane-border-style        fg=colour235
set -g pane-active-border-style fg=colour235
# Longer window to press the number after prefix-q (display-panes)
set -g display-panes-time 2000
