# OSC 52 clipboard passthrough — nvim yanks propagate through tmux to macOS
set -g set-clipboard on
set -g allow-passthrough on

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-features ",xterm-256color:RGB"
set -ag terminal-features ",xterm-256color:clipboard"

# Mouse support
set -g mouse on

# Longer scrollback
set -g history-limit 50000

# 1-based indexing
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Extended keys — pass Shift-Enter, Ctrl-; etc. through to apps (CSI u mode)
set -s extended-keys always
set -as terminal-features ",xterm-256color:extkeys"

# Vim-style splits (mirrors Ctrl-w s/v in nvim)
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# Vim-style pane navigation (mirrors Ctrl-w h/j/k/l in nvim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Close pane (mirrors Ctrl-w c in nvim)
unbind c
bind c kill-pane

# Reduce escape delay (important for nvim)
set -sg escape-time 10

# Focus events (needed by nvim autoread)
set -g focus-events on
