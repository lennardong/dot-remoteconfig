# OSC 52 clipboard passthrough — nvim yanks propagate through tmux to macOS
set -g set-clipboard on
set -g allow-passthrough on

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-features ",xterm-256color:RGB"
set -ag terminal-features ",xterm-256color:clipboard"
# Ghostty (outer terminal) — negotiate features against its real termname,
# else colour/key sequences mismatch and the TUI renders garbled.
set -ag terminal-features ",xterm-ghostty:RGB"
set -ag terminal-features ",xterm-ghostty:clipboard"

# Mouse support
set -g mouse off

# Longer scrollback
set -g history-limit 50000

# 1-based indexing
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Extended keys — pass Shift-Enter, Ctrl-; etc. through to apps (CSI u mode)
set -s extended-keys always
set -s extended-keys-format csi-u
set -as terminal-features ",xterm-256color:extkeys"
set -as terminal-features ",xterm-ghostty:extkeys"

# set vim for copy
setw -g mode-keys vi


# Splits — symmetric with nvim <leader>\/-
unbind s
unbind v
unbind '"'
unbind %
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Session picker (re-bind after unbinding old s)
bind s choose-tree -Zs -O name

# Sessionizer — fuzzy-pick a repo, one tmux session per repo
bind-key -r S run-shell "tmux neww ~/.config-remote/tmux/tmux-sessionizer"

# Resize — repeatable, mirrors nvim. Capitals so they don't clash with h/j/k/l nav
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# Vim-style pane navigation (mirrors Ctrl-w h/j/k/l in nvim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim-tmux-navigator: C-h/j/k/l crosses nvim/tmux boundary transparently
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Close pane (mirrors Ctrl-w c in nvim)
unbind c
bind c kill-pane

# Reduce escape delay (important for nvim)
set -sg escape-time 10

# Focus events (needed by nvim autoread)
set -g focus-events on

# Window chooser — collapsed session trees with windows visible
bind w choose-tree -sw

# Tmux Prefix key
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix


# Active pane signal — active keeps terminal bg, inactive dims, labeled bar on top
set -g window-style        'bg=colour235'
set -g window-active-style 'bg=terminal'
set -g pane-border-status top
set -g pane-border-format ' #{?pane_active,#[fg=black#,bg=colour118] ACTIVE ,#[fg=colour244#,bg=black] #P } #{pane_current_command} '
# Divider lines match the inactive bg so they blend away
set -g pane-border-style        fg=colour235
set -g pane-active-border-style fg=colour235
# Longer window to press the number after prefix-q (display-panes)
set -g display-panes-time 2000
