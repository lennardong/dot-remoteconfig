# OSC 52 clipboard passthrough — nvim yanks propagate through tmux to macOS
set -g set-clipboard on
set -g allow-passthrough on

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-features ",xterm-256color:RGB"
set -ag terminal-features ",xterm-256color:clipboard"

# Mouse support
set -g mouse on

# Longer scrollback
set -g history-limit 50000

# 1-based indexing
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Extended keys — pass Shift-Enter, Ctrl-; etc. through to apps (CSI u mode)
set -s extended-keys always
set -as terminal-features ",xterm-256color:extkeys"

# Splits — symmetric with nvim <leader>\/-
unbind s
unbind v
unbind '"'
unbind %
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Session picker (re-bind after unbinding old s)
bind s choose-tree -Zs

# Sessionizer — fuzzy-pick a repo, one tmux session per repo
bind-key -r S run-shell "tmux neww ~/.config-remote/tmux/tmux-sessionizer"

# Vim-style pane navigation (mirrors Ctrl-w h/j/k/l in nvim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim-tmux-navigator: C-h/j/k/l crosses nvim/tmux boundary transparently
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Close pane (mirrors Ctrl-w c in nvim)
unbind c
bind c kill-pane

# Reduce escape delay (important for nvim)
set -sg escape-time 10

# Focus events (needed by nvim autoread)
set -g focus-events on

# Window chooser — collapsed session trees with windows visible
bind w choose-tree -sw

# Tmux Prefix key
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

